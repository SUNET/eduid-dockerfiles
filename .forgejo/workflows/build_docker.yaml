name: build-docker

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  schedule:
    # weekly on monday 02:00
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: docker
    container: ghcr.io/catthehacker/ubuntu:act-22.04
    steps:
      - name: Checkout the repo
        uses: https://platform.sunet.se/actions/checkout@v4
      - name: Login to Container Registry
        uses: https://platform.sunet.se/actions/login-action@v3
        with:
          registry: platform.sunet.se
          username: ci-sunet-CHANGEME
          password: ${{ secrets.CI_SUNET_CHANGEME }}
      - name: Build and Push haproxy
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: haproxy
          tags: platform.sunet.se/eduid/haproxy:latest
      - name: Build and Push icinga
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: icinga
          tags: platform.sunet.se/eduid/icinga:latest
      - name: Build and Push mongodb
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: mongodb
          tags: platform.sunet.se/eduid/mongodb:latest
      - name: Build and Push munin
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: munin
          tags: platform.sunet.se/eduid/munin:latest
      - name: Build and Push nginx
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: nginx
          tags: platform.sunet.se/eduid/nginx:latest
      - name: Build and Push redis
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: redis
          tags: platform.sunet.se/eduid/redis:latest
      - name: Build and Push graphite
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: graphite
          tags: platform.sunet.se/eduid/graphite:latest
      - name: Build and Push squid
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: squid
          tags: platform.sunet.se/eduid/squid:latest
      - name: Build and Push statsd
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: statsd
          tags: platform.sunet.se/eduid/statsd:latest
      - name: Build and Push rsyslog
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: rsyslog
          tags: platform.sunet.se/eduid/rsyslog:latest
      - name: Build and Push frontend-tools
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: frontend-tools
          tags: platform.sunet.se/eduid/frontend-tools:latest
      - name: Build and Push influxdb
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: influxdb
          tags: platform.sunet.se/eduid/influxdb:latest
      - name: Build and Push varnish
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: varnish
          tags: platform.sunet.se/eduid/varnish:latest
      - name: Build and Push smptdfix
        uses: https://platform.sunet.se/actions/build-push-action@v6
        with:
          push: true
          context: smtpdfix
          tags: platform.sunet.se/eduid/smtpdfix:latest
      - name: Build and Push telegraf
        run: |
          TELEGRAF_VERSION="1.36.3-1"
          TELEGRAF_TAG="1.36.3"
          TELEGRAF_IMAGE="platform.sunet.se/eduid/telegraf"
          cd telegraf
          ./build.sh

